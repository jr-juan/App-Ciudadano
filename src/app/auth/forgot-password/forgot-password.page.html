<ion-header>
  <ion-toolbar>
    <ion-title>Recuperar contraseña</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
    <ion-item>
      <ion-label position="stacked">Correo electrónico</ion-label>
      <ion-input type="email" formControlName="email" autocomplete="email"></ion-input>
    </ion-item>
    <ion-text color="danger" *ngIf="emailInvalid">
      <p class="validation-message">Ingresa un correo válido.</p>
    </ion-text>

    <div class="actions">
      <ion-button expand="block" type="submit" [disabled]="forgotForm.invalid || loading">
        <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
        {{ loading ? 'Enviando...' : 'Enviar enlace' }}
      </ion-button>
    </div>

    <ion-text color="success" *ngIf="successMessage">
      <p class="success-message">{{ successMessage }}</p>
    </ion-text>

    <ion-text color="danger" *ngIf="errorMessage">
      <p class="error-message">{{ errorMessage }}</p>
    </ion-text>

    <ion-list>
      <ion-item button routerLink="/auth/login">Volver al login</ion-item>
    </ion-list>
  </form>
</ion-content>
